# =============================================================================
# Air Configuration untuk Hot-Reload Development
# =============================================================================

root = "."
testdata_dir = "testdata"
tmp_dir = "tmp"

[build]
  # Perintah build (disable VCS stamping untuk container)
  cmd = "go build -buildvcs=false -o ./tmp/main ."
  
  # Binary hasil build
  bin = "./tmp/main"
  
  # Argumen tambahan saat menjalankan binary
  args_bin = []
  
  # File/folder yang akan di-watch
  include_ext = ["go", "tpl", "tmpl", "html"]
  
  # File/folder yang diabaikan
  exclude_dir = ["assets", "tmp", "vendor", "testdata", "init-db"]
  exclude_file = []
  exclude_regex = ["_test.go"]
  exclude_unchanged = false
  
  # Follow symlinks
  follow_symlink = false
  
  # Log file path
  log = "build-errors.log"
  
  # Polling interval (ms)
  poll = false
  poll_interval = 0
  
  # Delay sebelum rebuild (ms)
  delay = 1000
  
  # Stop running old binary saat rebuild
  stop_on_error = false
  
  # Kirim interrupt signal sebelum kill
  send_interrupt = true
  
  # Delay sebelum kill (ms)
  kill_delay = 500
  
  # Rerun binary saat startup
  rerun = false
  rerun_delay = 500

[color]
  # Warna output
  main = "magenta"
  watcher = "cyan"
  build = "yellow"
  runner = "green"

[log]
  # Timestamp di log
  time = true
  
  # Tampilkan nama file yang di-watch
  main_only = false

[screen]
  # Clear screen saat rebuild
  clear_on_rebuild = true
  
  # Keep scroll position
  keep_scroll = true

[misc]
  # Clean on exit
  clean_on_exit = true
